<body class="login_page">
  <!-- <div class="header_sign">
    <a> <img src="assets/images/red-rectangle.png" alt="" /> </a>
    <a class="comn-btn">Sign Up</a>
  </div> -->

  <div class="siign_wrapper">
    <div class="text-center name">
      <h2 class="heading_one">Sign In</h2>
    </div>

    <div *ngIf="!isLoggedIn || !userData" class="form-style">
      <form class="row" [formGroup]="loginForm" (ngSubmit)="submit()">
        <div class="col-12">
          <label for="">Email</label>
          <div class="input-group">
            <input
              type="email"
              class="form-control"
              formControlName="username"
            />
          </div>
        </div>

        <div class="col-12">
          <label for="">Password</label>
          <div class="input-group">
            <input
              type="password"
              class="form-control"
              formControlName="password"
            />
            <div class="input-group-text">
              <i class="fas fa-eye-slash" id="eye"></i>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="d-flex justify-content-between">
            <div class="form-group">
              <input type="checkbox" id="html" />
              <label for="html">Remember Me</label>
            </div>
            <div class="d-md-none d-block">
              <a href="#" class="fp">Forget Password?</a>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="form-group">
            <button
              formaction="lobbyflow-cash.html"
              class="comn-btn w-100"
              [disabled]="!loginForm.valid"
            >
              Sign In
            </button>
          </div>
        </div>
      </form>

      <div class="d-md-block d-none">
        <a href="#" class="fp">Forget Password?</a>
      </div>

      <span class="d-md-none d-block css-mobil001"> Sign In with </span>

      <div class="d-flex d-md-block align-items-center justify-content-between">
        <a class="social" href="lobbyflow-cash.html">
          <img src="assets/images/google.svg" alt="" />
          <span class="d-md-inline d-none">Sign In with </span> Google</a
        >
        <a class="social" href="lobbyflow-cash.html">
          <img src="assets/images/apple.svg" alt="" />
          <span class="d-md-inline d-none"> Sign In with </span> Apple</a
        >
      </div>

      <div class="pt-4 text-center">
        <p class="option">
          Don’t have an account? <a href="sign-up.html">Sign Up Now</a>
        </p>
      </div>
    </div>

    <div *ngIf="isLoggedIn && userData" class="form-style">
      <p class="text-center">
        Currently logged in as <br />
        {{ userData.email }}
      </p>

      <a (click)="gotoLobby()" class="comn-btn w-100 mb-3"> Go to Lobby </a>
      <a (click)="logout()" class="comn-btn w-100"> Signout </a>
    </div>
  </div>
</body>
